<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c8df6"/>
      <stop offset="100%" stop-color="#1e53e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#131722"/>

  <!-- Subtle baseline -->
  <line x1="5" y1="26.5" x2="27" y2="26.5" stroke="#2a2e39" stroke-width="0.75"/>

  <!-- Bar 1 — muted, short -->
  <rect x="5.5" y="21" width="5" height="5.5" rx="1" fill="#2e3d5c"/>

  <!-- Bar 2 — teal, medium -->
  <rect x="13.5" y="15" width="5" height="11.5" rx="1" fill="#26a69a"/>

  <!-- Bar 3 — blue gradient, tall (the winner) -->
  <rect x="21.5" y="8" width="5" height="18.5" rx="1" fill="url(#bar3)"/>

  <!-- Trend line connecting bar tops -->
  <polyline
    points="8,21 16,15 24,8"
    fill="none"
    stroke="#5c8df6"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.65"
  />

  <!-- Agent dot at peak — outer ring + solid fill -->
  <circle cx="24" cy="8" r="2.8" fill="#1e2a42"/>
  <circle cx="24" cy="8" r="1.6" fill="#5c8df6"/>
</svg>
